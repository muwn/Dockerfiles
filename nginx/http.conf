# 基于客户端 IP 做统一限流，避免单个来源短时压满服务
limit_req_zone $binary_remote_addr zone=http_global_limit:10m rate=20r/s;
limit_req_status 429;
limit_req_log_level warn;
limit_req zone=http_global_limit burst=40 nodelay;

# 为 OSS 文件缓存预定义本地磁盘缓存区，后续可在任意 location 中按需引用
#
# 使用方式：
# location /oss/ {
#     proxy_pass https://static.example.com/;
#     proxy_set_header Host static.example.com;
#     proxy_cache oss_file_cache; # 引用这里定义的缓存区名称；不写这行就不会启用代理缓存
#     proxy_cache_methods GET HEAD; # 只缓存文件下载常见的 GET / HEAD，请求带副作用的方法不要纳入缓存
#     proxy_cache_valid 200 24h; # 定义不同响应码的缓存时长；文件更新频率高时优先调短这里
#     proxy_cache_valid 206 1h; # 缓存206响应，避免缓存206响应导致缓存命中率下降
#     proxy_cache_valid 301 302 10m; # 缓存 301 302 响应，避免缓存 301 302 响应导致缓存命中率下降
#     proxy_cache_valid 404 1m; # 缓存 404 响应，避免缓存 404 响应导致缓存命中率下降
#     add_header X-Proxy-Cache $upstream_cache_status always; # 通过响应头观察命中情况，常见值有 MISS / HIT / BYPASS / EXPIRED
# }
#
# 参数说明：
# - levels=1:2：按两级目录散列缓存文件，避免单目录文件过多
# - keys_zone=oss_file_cache:100m：缓存区名称与元数据内存大小，来源 URL 很多时可适当调大
# - max_size=10g：缓存文件总上限，磁盘预算更小或更大时按需调整
# - inactive=7d：超过 7 天无人访问的缓存会被回收，热点保留更久可调大
# - use_temp_path=off：直接在目标缓存目录写入，减少跨目录移动带来的额外 IO
proxy_cache_path /var/cache/nginx/oss levels=1:2 keys_zone=oss_file_cache:100m max_size=10g inactive=7d use_temp_path=off;
