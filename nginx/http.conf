# 基于客户端 IP 做统一限流，避免单个来源短时压满服务
#
# 参数说明：
# - $binary_remote_addr：按客户端 IP 限流；前面还有网关或 CDN 时，需要先确认真实来源 IP 已正确透传
# - zone=http_global_limit:10m：限流区名称与状态内存大小；来源 IP 特别多时可适当调大
# - rate=20r/s：单个来源的稳定请求速率；正常流量被误伤时优先调大这里或配合增大 burst
# - burst=40：允许短时间超过 rate 的突发容量；业务存在瞬时并发时通常先调这个值
# - nodelay：突发请求在 burst 范围内直接放行；如果更希望平滑限速而不是立即放行，可以去掉它
limit_req_zone $binary_remote_addr zone=http_global_limit:10m rate=20r/s; # 以客户端 IP 为维度建限流区，速率超过 20r/s 时进入突发控制
limit_req_status 429; # 超出限流阈值后返回 429，便于客户端区分这是主动限流而不是网关异常
limit_req_log_level warn; # 命中限流时按 warn 记日志，便于观察是否出现误伤或异常流量
limit_req zone=http_global_limit burst=40 nodelay; # 允许额外 40 个突发请求直接通过，不排队；超过后才按限流规则拒绝

# 为 OSS 文件缓存预定义本地磁盘缓存区，后续可在任意 location 中按需引用
#
# 使用方式：
# location /oss/ {
#     proxy_pass https://static.example.com/;
#     proxy_set_header Host static.example.com;
#     proxy_cache oss_file_cache; # 引用这里定义的缓存区名称；不写这行时，请求仍会回源，但不会落本地缓存
#     proxy_cache_methods GET HEAD; # 只缓存文件下载常见的 GET / HEAD，避免把带副作用的请求纳入缓存
#     proxy_cache_valid 200 24h; # 200 通常是完整文件内容，缓存时间最长；文件更新更频繁时优先缩短这里
#     proxy_cache_valid 206 1h; # 206 是断点续传或分片下载响应，单独缩短缓存时间可减少大文件分段缓存占用
#     proxy_cache_valid 301 302 10m; # 301 / 302 是跳转结果，短时缓存可减少重复回源，同时避免跳转关系变更后长时间不生效
#     proxy_cache_valid 404 1m; # 404 短暂缓存可拦住不存在文件的重复探测，但时间不宜过长，避免新文件上线后仍命中旧的不存在结果
#     add_header X-Proxy-Cache $upstream_cache_status always; # 通过响应头观察缓存命中情况，常见值有 MISS / HIT / BYPASS / EXPIRED
# }
#
# 参数说明：
# - levels=1:2：按两级目录散列缓存文件，避免单目录下文件过多影响查找效率
# - keys_zone=oss_file_cache:100m：缓存区名称与元数据内存大小；来源 URL 很多时优先调大这里
# - max_size=10g：缓存文件总上限；磁盘预算有限或热点文件更多时按需调整
# - inactive=7d：7 天未被访问的缓存会被回收；长尾文件也希望复用时可适当调大
# - use_temp_path=off：直接写入目标缓存目录，减少临时目录到缓存目录的额外移动 IO
proxy_cache_path /var/cache/nginx/oss levels=1:2 keys_zone=oss_file_cache:100m max_size=10g inactive=7d use_temp_path=off;
