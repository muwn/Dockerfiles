x-default-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 5s
  retries: 2
  start_period: 10s

services:
  claude-code:
    container_name: claude-code
    image: muwn/claude-code:latest
    restart: unless-stopped
    command: ["sh", "-c", "tail -f /dev/null"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./volumes/npm-global/:/opt/claude-global/
      - ./volumes/claude/:/root/.claude/
      - ./volumes/workspace/:/workspace/
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.01'
          memory: 10M
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "test -x /opt/claude-global/bin/claude || test -x /usr/local/bin/docker-entrypoint.sh"]
