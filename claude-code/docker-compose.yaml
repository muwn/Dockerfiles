x-default-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 5s
  retries: 2
  start_period: 10s

services:
  claude-code:
    container_name: claude-code
    image: muwn/claude-code:latest
    restart: unless-stopped
    command: ["sh", "-c", "tail -f /dev/null"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./volumes/npm-global/:/home/cc/.local/
      - ./volumes/claude/:/home/cc/.claude/
      - ./volumes/cc-connect/:/home/cc/.cc-connect/
      - ./volumes/workspace/:/workspace/
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "test -x /home/cc/.local/bin/claude"]
