x-default-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 5s
  retries: 2
  start_period: 10s

services:
  claude-code:
    container_name: claude-code
    image: muwn/claude-code:latest
    restart: unless-stopped
    user: "1000:1000"
    command: ["sh", "-c", "cc-connect"]
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./volumes/cc/:/home/cc/
      - ./volumes/workspace/:/workspace/
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "test -x /home/cc/.local/bin/claude"]
