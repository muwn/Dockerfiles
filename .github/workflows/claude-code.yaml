name: claude-code
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version'
        required: true
        default: '1.1.0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Prepare
        id: prepare
        run: |
          VERSION=${{ github.event.inputs.version }}
          IMAGE_NAME=claude-code
          echo "image-name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          {
            echo "tags<<EOF"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${VERSION}"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ steps.prepare.outputs.image-name }}
          file: ./${{ steps.prepare.outputs.image-name }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.prepare.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
